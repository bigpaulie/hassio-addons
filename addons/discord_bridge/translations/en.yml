---
configuration:
  discord_token:
    name: Discord Bot Token
    description: The bot token used to connect to your Discord server.
  webhook_url:
    name: Webhook URL
    description: The n8n webhook URL where Discord messages will be forwarded.
  allowed_channels:
    name: Allowed Channels
    description: >-
      List of Discord channel IDs to forward. Leave empty to forward messages
      from all channels.
  debug:
    name: Debug logging
    description: >-
      Enable verbose logs in the add-on log (message filtering, webhook
      requests, Discord gateway events). Turn off when not troubleshooting.
